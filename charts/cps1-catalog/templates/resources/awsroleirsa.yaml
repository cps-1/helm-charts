{{- if has "awsiamrole" .Values.includeResources }}
apiVersion: cps1.tech/v1alpha1
kind: ResourceSet
metadata:
  name: awsiamroleirsa
spec:
  label: Amazon Role IRSA
  icon:
    svg: |
      {{- .Files.Get "images/awsiam.svg" | nindent 6 }}
  description: >-
    Use an existing AWS IAM Role to access existing AWS resources without any
    additional credentials.
  input:
    - name: role_arn
      label: Role ARN
      kind: string
      required: true
  output:
    - name: sa_name
      source: ${sa.name}
  resources:
    - id: sa
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          annotations:
            eks.amazonaws.com/role-arn: ${input.role_arn}
{{- end }}
